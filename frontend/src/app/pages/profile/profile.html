<section class="mx-auto flex w-full max-w-md flex-col gap-6 bg-white px-4 py-10 sm:px-6 dark:bg-slate-950">
    <div class="flex flex-col items-center gap-3 text-center">
        <label class="group relative flex h-24 w-24 cursor-pointer items-center justify-center overflow-hidden rounded-full border-2 border-slate-200 bg-slate-50 text-slate-400 transition-colors duration-150 hover:border-indigo-400 dark:border-slate-700 dark:bg-slate-800">
            @if (currentUser()?.profileImageUrl) {
                <img [src]="currentUser()?.profileImageUrl" alt="Profile photo" class="h-full w-full object-cover" />
            } @else {
                <ng-icon name="faSolidUser" size="1.5rem"></ng-icon>
            }
            <span class="absolute inset-0 flex items-center justify-center bg-black/40 text-white opacity-0 transition-opacity duration-150 group-hover:opacity-100">
                <ng-icon name="faSolidCamera" size="1.1rem"></ng-icon>
            </span>
            <input type="file" accept="image/*" class="hidden" [disabled]="uploadingImage()" (change)="onImageSelected($event)" />
        </label>
        @if (uploadingImage()) {
            <span class="text-xs text-slate-400 dark:text-slate-500">Uploading…</span>
        }

        <div>
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">{{ currentUser()?.name }}</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">{{ currentUser()?.email }}</p>
        </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4 rounded-xl bg-white p-5 ring-1 ring-slate-200 shadow-sm dark:bg-slate-900 dark:ring-slate-800">
        <label class="flex flex-col gap-1.5">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Full name</span>
            <span class="flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 focus-within:ring-2 focus-within:ring-indigo-500 dark:border-slate-700 dark:bg-slate-950">
                <ng-icon name="faSolidUser" size="0.9rem" class="text-slate-400"></ng-icon>
                <input type="text" formControlName="name" class="w-full bg-transparent text-sm text-slate-900 outline-none placeholder:text-slate-400 dark:text-white" />
            </span>
            @if (form.controls.name.invalid && form.controls.name.touched) {
                <span class="text-xs font-medium text-red-600 dark:text-red-400">Enter your full name.</span>
            }
        </label>

        <label class="flex flex-col gap-1.5">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">ZIP code</span>
            <span class="flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 focus-within:ring-2 focus-within:ring-indigo-500 dark:border-slate-700 dark:bg-slate-950">
                <ng-icon name="faSolidLocationDot" size="0.9rem" class="text-slate-400"></ng-icon>
                <input type="text" formControlName="zipCode" inputmode="numeric" class="w-full bg-transparent text-sm text-slate-900 outline-none placeholder:text-slate-400 dark:text-white" />
            </span>
            @if (form.controls.zipCode.invalid && form.controls.zipCode.touched) {
                <span class="text-xs font-medium text-red-600 dark:text-red-400">Enter a valid US ZIP code.</span>
            }
        </label>

        <label class="flex flex-col gap-1.5">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">State</span>
            <select formControlName="state" class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white">
                <option value="" disabled>Select a state</option>
                @for (state of states; track state) {
                    <option [value]="state">{{ state }}</option>
                }
            </select>
            @if (form.controls.state.invalid && form.controls.state.touched) {
                <span class="text-xs font-medium text-red-600 dark:text-red-400">Select your state.</span>
            }
        </label>

        @if (successMessage()) {
            <p class="text-sm font-medium text-emerald-600 dark:text-emerald-400">{{ successMessage() }}</p>
        }
        @if (errorMessage()) {
            <p class="text-sm font-medium text-red-600 dark:text-red-400">{{ errorMessage() }}</p>
        }

        <button
            type="submit"
            [disabled]="saving()"
            class="mt-1 flex items-center justify-center gap-2 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition-colors duration-150 hover:bg-indigo-700 disabled:opacity-60"
        >
            <ng-icon name="faSolidFloppyDisk" size="0.9rem"></ng-icon>
            {{ saving() ? 'Saving…' : 'Save changes' }}
        </button>
    </form>
</section>
