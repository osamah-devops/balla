<section class="mx-auto flex w-full max-w-full flex-col gap-6 bg-white px-4 py-6 sm:px-6 lg:px-8 dark:bg-slate-950">
    <div>
        <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">All Categories</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400">{{ categories.length }} categories to explore</p>
    </div>

    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">
        @for (category of categories; track category.slug) {
            <a
                [routerLink]="['/category', category.slug]"
                class="group relative block h-36 overflow-hidden rounded-xl shadow-sm ring-1 ring-slate-200 sm:h-44 dark:ring-slate-800"
            >
                <img
                    [src]="category.image"
                    [alt]="category.name"
                    loading="lazy"
                    class="h-full w-full object-cover transition-transform duration-200 group-hover:scale-105"
                />
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
                <h2 class="absolute inset-x-0 bottom-0 p-3 text-sm font-bold text-white sm:text-base">{{ category.name }}</h2>
            </a>
        }
    </div>
</section>
