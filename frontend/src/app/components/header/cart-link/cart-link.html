<a routerLink="/cart" class="relative flex h-9 w-9 items-center justify-center rounded-lg text-slate-600 transition-colors duration-150 hover:bg-slate-100 hover:text-indigo-600 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-indigo-400">
    <ng-icon name="faSolidCartShopping" size="1rem"></ng-icon>
    @if (itemCount() > 0) {
        <span class="absolute -top-1 -right-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-bold text-white">{{ itemCount() }}</span>
    }
</a>
