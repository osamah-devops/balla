<header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/90 backdrop-blur-md transition-colors duration-200 dark:border-slate-800 dark:bg-slate-900/90">
    <div class="mx-auto flex h-16 w-full max-w-10xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
        <app-logo></app-logo>

        @if (!isMobile) {
            <app-main-nav class="flex flex-1 justify-center" (routePathChange)="onMainNavRoutePathChange($event)"></app-main-nav>
        }

        <div class="flex items-center gap-2 sm:gap-3">
            @if (!isMobile) {
                <app-cart-link></app-cart-link>
                <app-auth-nav [currentPath]="currentPath"></app-auth-nav>
                <app-theme-toggler></app-theme-toggler>
            }
            @if (isMobile) {
                <app-cart-link></app-cart-link>
                <app-theme-toggler></app-theme-toggler>
                <app-mobile-menu-button [isOpen]="mobileMenuOpen" (toggle)="toggleMobileMenu()"></app-mobile-menu-button>
            }
        </div>
    </div>

    @if (isMobile && mobileMenuOpen) {
        <div class="w-full border-t border-slate-200 bg-white px-4 py-4 shadow-lg transition-colors duration-200 sm:px-6 dark:border-slate-800 dark:bg-slate-900">
            <app-main-nav [mobile]="true" (linkClick)="closeMobileMenu()" (routePathChange)="onMainNavRoutePathChange($event)"></app-main-nav>
            <div class="my-3 border-t border-slate-200 dark:border-slate-800"></div>
            <app-auth-nav [mobile]="true" [currentPath]="currentPath" (linkClick)="closeMobileMenu()"></app-auth-nav>
        </div>
    }
</header>
