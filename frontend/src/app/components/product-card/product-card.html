<a
    [routerLink]="['/product', product().id]"
    [title]="'Sold by ' + product().owner.name"
    class="group/card relative flex flex-col overflow-hidden rounded-xl bg-white! ring-1 ring-slate-200 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:ring-slate-300 dark:bg-slate-900! dark:ring-slate-800 dark:hover:ring-slate-700"
>
    <button
        type="button"
        (click)="toggleFavorite($event)"
        [attr.aria-label]="isFavorite() ? 'Remove from favorites' : 'Add to favorites'"
        class="absolute right-2 top-2 z-10 flex h-8 w-8 items-center justify-center rounded-full bg-white/90 shadow-sm transition-colors duration-150 hover:bg-white dark:bg-slate-900/90 dark:hover:bg-slate-900"
    >
        <ng-icon [name]="isFavorite() ? 'faSolidHeartFilled' : 'faRegularHeart'" size="0.9rem" [class]="isFavorite() ? 'text-rose-500' : 'text-slate-500 dark:text-slate-300'"></ng-icon>
    </button>

    <span class="block aspect-square overflow-hidden">
        <img
            [src]="product().image"
            [alt]="product().title"
            loading="lazy"
            class="h-full w-full object-cover transition-transform duration-200 group-hover/card:scale-105"
        />
    </span>
    <span class="flex flex-1 flex-col gap-1 p-3">
        <span class="line-clamp-2 text-sm font-semibold text-slate-900 dark:text-white">{{ product().title }}</span>
        <span class="text-base font-extrabold text-indigo-600 dark:text-indigo-400">{{ product().price }}</span>
        <span class="mt-auto truncate text-xs text-slate-500 dark:text-slate-400">{{ product().owner.name }}</span>
    </span>
</a>
