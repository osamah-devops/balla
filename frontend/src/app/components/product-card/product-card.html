<a
    [routerLink]="['/product', product().id]"
    [title]="'Sold by ' + product().owner.name"
    class="group/card flex flex-col overflow-hidden rounded-xl bg-white! ring-1 ring-slate-200 shadow-sm transition-shadow duration-150 hover:shadow-md dark:bg-slate-900! dark:ring-slate-800"
>
    <span class="block aspect-square overflow-hidden">
        <img
            [src]="product().image"
            [alt]="product().title"
            loading="lazy"
            class="h-full w-full object-cover transition-transform duration-200 group-hover/card:scale-105"
        />
    </span>
    <span class="flex flex-1 flex-col gap-1 p-3">
        <span class="line-clamp-2 text-sm font-semibold text-slate-900 dark:text-white">{{ product().title }}</span>
        <span class="text-sm font-bold text-indigo-600 dark:text-indigo-400">{{ product().price }}</span>
        <span class="mt-auto truncate text-xs text-slate-500 dark:text-slate-400">{{ product().owner.name }}</span>
    </span>
</a>
