name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/Balla.Api/**"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: balla-api
  ECS_CLUSTER: balla-ecs-cluster
  ECS_SERVICE: balla-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug OIDC token claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
            console.log(JSON.stringify({ sub: payload.sub, aud: payload.aud, repository: payload.repository, ref: payload.ref, event_name: payload.event_name, repository_owner: payload.repository_owner }, null, 2));

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push image
        working-directory: backend/Balla.Api
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          image="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$image:${{ github.sha }}" -t "$image:latest" .
          docker push "$image:${{ github.sha }}"
          docker push "$image:latest"

      - name: Deploy new image to ECS
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"